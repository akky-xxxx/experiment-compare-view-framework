<div class="root">
  <ul class="ul">
    @for (day of DAYS; track day) {
      <li>
        <day-cell [day]="day" />
      </li>
    }

    @for (date of dates(); track date) {
      <li>
        <calendar-cell
          [date]="date"
          [isCurrentMonth]="date.getMonth() + 1 === this.currentMonth()"
        >
          <!-- TODO: TaskList を作ったらここに差し込む -->
        </calendar-cell>
      </li>
    }
  </ul>
</div>
