<div class="root">
  <month-selector>
    <sibling-month-button
      slot="previous-button"
      direction="previous"
      (handleClick)="handlePreviousMonthClick.emit()"
    />
    <div slot="month">{{ currentMonth() }}月</div>
    <sibling-month-button
      slot="next-button"
      direction="next"
      (handleClick)="handleNextMonthClick.emit()"
    />
  </month-selector>

  <ul class="ul">
    @for (day of DAYS; track day) {
      <li>
        <day-cell [day]="day" />
      </li>
    }

    @for (date of dates(); track date) {
      <li>
        <calendar-cell
          [date]="date"
          [isCurrentMonth]="date.getMonth() + 1 === this.currentMonth()"
        >
          <!-- TODO: TaskList を作ったらここに差し込む -->
        </calendar-cell>
      </li>
    }
  </ul>
</div>
