<ng-template #taskListTemplate>
  <!-- TODO: TaskList を作ったらここに差し込む -->
</ng-template>

<div class="root">
  <ul class="ul">
    @for (day of DAYS; track day) {
      <li>
        <day-cell [day]="day" />
      </li>
    }

    @for (date of dates(); track date) {
      <li>
        <calendar-cell
          [taskListSlot]="taskListTemplate"
          [date]="date"
          [isCurrentMonth]="date.getMonth() + 1 === this.currentMonth()"
        />
      </li>
    }
  </ul>
</div>
