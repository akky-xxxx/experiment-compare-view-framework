<div class="root" [style]="cellColor()">
  <header class="header">{{ currentDate() }}</header>

  <ng-container *ngTemplateOutlet="taskListSlot()" />

  <a
    [attr.aria-label]="currentDate() + '日のタスクを作成'"
    [queryParams]="queryParameters()"
    class="cellLink"
    routerLink="/task/create"
  ></a>
</div>
